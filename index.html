<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>俺回来了！！！！</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:
        "PingFang SC",
        "Microsoft YaHei",
        sans-serif;
    background:#050816;
}

canvas{
    position:fixed;
    inset:0;
    z-index:0;
}

.container{
    position:relative;
    z-index:2;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.glow{
    position:absolute;
    width:70vw;
    height:70vw;
    background:radial-gradient(circle,
        rgba(255,0,150,.35),
        rgba(0,200,255,.12),
        transparent 70%);
    filter:blur(50px);
    animation:float 6s ease-in-out infinite alternate;
}

@keyframes float{
    from{
        transform:translateY(-20px) scale(1);
    }
    to{
        transform:translateY(20px) scale(1.15);
    }
}

.text-wrap{
    position:relative;
    text-align:center;
    perspective:1200px;
}

.main-text{
    font-size:clamp(2.8rem,11vw,6rem);
    font-weight:900;
    letter-spacing:4px;
    line-height:1.2;

    background:linear-gradient(
        135deg,
        #ffffff 0%,
        #ffd6f5 20%,
        #ff61d8 45%,
        #7cf7ff 70%,
        #ffffff 100%
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    text-shadow:
        0 2px 0 rgba(255,255,255,.25),
        0 6px 18px rgba(255,0,150,.45),
        0 10px 40px rgba(0,200,255,.35);

    transform-style:preserve-3d;

    animation:
        pulse 3s ease-in-out infinite,
        rotate3d 6s ease-in-out infinite alternate;
}

.main-text::after{
    content:attr(data-text);
    position:absolute;
    left:0;
    top:0;
    z-index:-1;

    background:linear-gradient(
        180deg,
        rgba(255,255,255,.15),
        rgba(0,0,0,.7)
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    transform:
        translateZ(-35px)
        translateY(12px);

    filter:blur(2px);
    opacity:.65;
}

@keyframes pulse{
    0%,100%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.04);
    }
}

@keyframes rotate3d{
    from{
        transform:
            rotateX(4deg)
            rotateY(-7deg);
    }
    to{
        transform:
            rotateX(-4deg)
            rotateY(7deg);
    }
}

.sub{
    margin-top:18px;
    color:rgba(255,255,255,.75);
    font-size:14px;
    letter-spacing:2px;
    text-shadow:0 0 12px rgba(255,255,255,.35);
}

.panel{
    position:fixed;
    bottom:24px;
    left:50%;
    transform:translateX(-50%);
    width:min(92vw,500px);
    z-index:5;

    backdrop-filter:blur(16px);
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.12);

    border-radius:24px;
    padding:14px;
    box-shadow:
        0 10px 40px rgba(0,0,0,.4),
        inset 0 1px 0 rgba(255,255,255,.08);
}

.input{
    width:100%;
    border:none;
    outline:none;

    background:rgba(255,255,255,.08);
    color:#fff;

    padding:14px 18px;
    border-radius:16px;

    font-size:16px;
}

.input::placeholder{
    color:rgba(255,255,255,.45);
}

.tip{
    margin-top:10px;
    text-align:center;
    color:rgba(255,255,255,.5);
    font-size:12px;
}

.heart{
    position:absolute;
    pointer-events:none;
    font-size:18px;
    animation:fly 1.8s linear forwards;
}

@keyframes fly{
    0%{
        transform:
            translate(-50%,0)
            scale(.5);
        opacity:1;
    }
    100%{
        transform:
            translate(-50%,-120px)
            scale(1.8)
            rotate(25deg);
        opacity:0;
    }
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="container">

    <div class="glow"></div>

    <div class="text-wrap">
        <div
            class="main-text"
            id="mainText"
            data-text="俺回来了！！！！"
        >
            俺回来了！！！！
        </div>

        <div class="sub">
            ✦ 点屏幕会炸开小爱心和粒子 ✦
        </div>
    </div>
</div>

<div class="panel">
    <input
        class="input"
        id="textInput"
        type="text"
        value="俺回来了！！！！"
        maxlength="40"
    />
    <div class="tip">
        修改文字即可实时更新 ✨
    </div>
</div>

<script>
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

let w,h;
let particles=[];

function resize(){
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

class Particle{
    constructor(x,y){
        this.x=x;
        this.y=y;

        this.vx=(Math.random()-0.5)*2;
        this.vy=(Math.random()-0.5)*2;

        this.size=Math.random()*3+1;

        this.alpha=Math.random()*0.7+0.3;

        this.color=[
            "#ff61d8",
            "#7cf7ff",
            "#ffffff",
            "#ffd166"
        ][Math.floor(Math.random()*4)];
    }

    update(){
        this.x+=this.vx;
        this.y+=this.vy;

        if(this.x<0||this.x>w) this.vx*=-1;
        if(this.y<0||this.y>h) this.vy*=-1;
    }

    draw(){
        ctx.beginPath();
        ctx.globalAlpha=this.alpha;
        ctx.fillStyle=this.color;
        ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
        ctx.fill();
    }
}

for(let i=0;i<140;i++){
    particles.push(
        new Particle(
            Math.random()*w,
            Math.random()*h
        )
    );
}

let mouse={
    x:null,
    y:null
};

window.addEventListener("touchmove",e=>{
    mouse.x=e.touches[0].clientX;
    mouse.y=e.touches[0].clientY;
});

window.addEventListener("mousemove",e=>{
    mouse.x=e.clientX;
    mouse.y=e.clientY;
});

function connect(){
    for(let a=0;a<particles.length;a++){
        for(let b=a;b<particles.length;b++){

            let dx=particles[a].x-particles[b].x;
            let dy=particles[a].y-particles[b].y;

            let dist=dx*dx+dy*dy;

            if(dist<7000){

                ctx.beginPath();

                ctx.strokeStyle=
                    "rgba(255,255,255,"+
                    (1-dist/7000)*0.12+
                    ")";

                ctx.lineWidth=1;

                ctx.moveTo(
                    particles[a].x,
                    particles[a].y
                );

                ctx.lineTo(
                    particles[b].x,
                    particles[b].y
                );

                ctx.stroke();
            }
        }
    }
}

function animate(){
    ctx.clearRect(0,0,w,h);

    particles.forEach(p=>{
        p.update();
        p.draw();

        if(mouse.x){
            let dx=mouse.x-p.x;
            let dy=mouse.y-p.y;
            let dist=Math.sqrt(dx*dx+dy*dy);

            if(dist<120){
                p.x-=dx*0.008;
                p.y-=dy*0.008;
            }
        }
    });

    connect();

    requestAnimationFrame(animate);
}

animate();

const input=document.getElementById("textInput");
const text=document.getElementById("mainText");

input.addEventListener("input",()=>{
    let value=input.value.trim();

    if(!value){
        value="俺回来了！！！！";
    }

    text.innerText=value;
    text.setAttribute("data-text",value);
});

function spawnHeart(x,y){
    const heart=document.createElement("div");

    heart.className="heart";

    const arr=["💖","✨","💘","🌸","💫"];

    heart.innerText=
        arr[Math.floor(Math.random()*arr.length)];

    heart.style.left=x+"px";
    heart.style.top=y+"px";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },1800);
}

window.addEventListener("click",e=>{
    for(let i=0;i<8;i++){
        spawnHeart(
            e.clientX+(Math.random()-0.5)*40,
            e.clientY+(Math.random()-0.5)*40
        );
    }
});

window.addEventListener("touchstart",e=>{
    const t=e.touches[0];

    for(let i=0;i<8;i++){
        spawnHeart(
            t.clientX+(Math.random()-0.5)*40,
            t.clientY+(Math.random()-0.5)*40
        );
    }
});
</script>

</body>
</html>
