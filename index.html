<script>
const canvas = document.getElementById('particleCanvas');
const ctx = canvas.getContext('2d');

let width, height;

function resize(){
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}
resize();

window.addEventListener("resize", () => {
    resize();
    init();
});

const particles = [];
const textMessage = "你咋不找我聊天";

const mouse = {
    x:null,
    y:null,
    radius:140,
    down:false
};

window.addEventListener("mousemove",e=>{
    mouse.x=e.clientX;
    mouse.y=e.clientY;
});

window.addEventListener("touchmove",e=>{
    mouse.x=e.touches[0].clientX;
    mouse.y=e.touches[0].clientY;
},{passive:true});

window.addEventListener("mousedown",()=>{
    mouse.down=true;
    shockwave(mouse.x,mouse.y);
});

window.addEventListener("mouseup",()=>{
    mouse.down=false;
});

window.addEventListener("touchstart",e=>{
    mouse.x=e.touches[0].clientX;
    mouse.y=e.touches[0].clientY;
    mouse.down=true;
    shockwave(mouse.x,mouse.y);
},{passive:true});

window.addEventListener("touchend",()=>{
    mouse.down=false;
});

class Particle{

    constructor(x,y,color){

        this.x=Math.random()*width;
        this.y=Math.random()*height;

        this.destX=x;
        this.destY=y;

        this.color=color;

        this.size=Math.random()*2+1;

        this.baseSize=this.size;

        this.vx=(Math.random()-0.5)*15;
        this.vy=(Math.random()-0.5)*15;

        this.friction=0.88;

        this.ease=0.03+Math.random()*0.03;

        this.depth=Math.random()*2;

        this.angle=Math.random()*Math.PI*2;
    }

    draw(){

        ctx.beginPath();

        const glow = 10 * this.depth;

        ctx.shadowBlur = glow;
        ctx.shadowColor = this.color;

        ctx.fillStyle=this.color;

        ctx.arc(
            this.x,
            this.y,
            this.size,
            0,
            Math.PI*2
        );

        ctx.fill();
    }

    update(){

        let dx = this.destX - this.x;
        let dy = this.destY - this.y;

        this.vx += dx * this.ease;
        this.vy += dy * this.ease;

        if(mouse.x){

            let mx = mouse.x - this.x;
            let my = mouse.y - this.y;

            let dist = Math.sqrt(mx*mx + my*my);

            if(dist < mouse.radius){

                let force = (mouse.radius - dist) / mouse.radius;

                let angle = Math.atan2(my,mx);

                let power = mouse.down ? 8 : 3;

                this.vx -= Math.cos(angle) * force * power;
                this.vy -= Math.sin(angle) * force * power;

                this.size = this.baseSize + force * 3;
            }else{
                this.size += (this.baseSize - this.size)*0.1;
            }
        }

        this.vx *= this.friction;
        this.vy *= this.friction;

        this.x += this.vx;
        this.y += this.vy;
    }
}

function shockwave(x,y){

    for(let i=0;i<35;i++){

        let p = new Particle(
            x,
            y,
            `hsl(${280+Math.random()*80},100%,70%)`
        );

        p.x=x;
        p.y=y;

        p.vx=(Math.random()-0.5)*35;
        p.vy=(Math.random()-0.5)*35;

        p.ease=0.008;

        particles.push(p);

        setTimeout(()=>{
            let index=particles.indexOf(p);
            if(index>-1){
                particles.splice(index,1);
            }
        },2500);
    }
}

function init(){

    particles.length=0;

    const tempCanvas=document.createElement("canvas");
    const tempCtx=tempCanvas.getContext("2d");

    tempCanvas.width=width;
    tempCanvas.height=height;

    let fontSize;

    if(width < 600){
        fontSize=42;
    }else if(width < 1000){
        fontSize=82;
    }else{
        fontSize=130;
    }

    tempCtx.fillStyle="white";

    tempCtx.font=`900 ${fontSize}px sans-serif`;

    tempCtx.textAlign="center";
    tempCtx.textBaseline="middle";

    tempCtx.fillText(
        textMessage,
        width/2,
        height/2
    );

    const data=tempCtx.getImageData(
        0,
        0,
        width,
        height
    );

    const gap = width < 600 ? 4 : 5;

    for(let y=0;y<height;y+=gap){

        for(let x=0;x<width;x+=gap){

            const index=(y*width+x)*4;

            const alpha=data.data[index+3];

            if(alpha > 128){

                const hue =
                    280 + Math.random()*80;

                const color =
                    `hsla(${hue},100%,70%,0.95)`;

                particles.push(
                    new Particle(x,y,color)
                );
            }
        }
    }
}

function connectParticles(){

    for(let a=0;a<particles.length;a++){

        for(let b=a;b<particles.length;b++){

            let dx =
                particles[a].x -
                particles[b].x;

            let dy =
                particles[a].y -
                particles[b].y;

            let dist =
                dx*dx + dy*dy;

            if(dist < 1800){

                ctx.beginPath();

                ctx.strokeStyle =
                    `rgba(255,255,255,${
                        0.08 - dist/1800*0.08
                    })`;

                ctx.lineWidth=1;

                ctx.moveTo(
                    particles[a].x,
                    particles[a].y
                );

                ctx.lineTo(
                    particles[b].x,
                    particles[b].y
                );

                ctx.stroke();
            }
        }
    }
}

function animate(){

    ctx.fillStyle="rgba(5,5,10,0.18)";
    ctx.fillRect(0,0,width,height);

    connectParticles();

    for(let p of particles){
        p.update();
        p.draw();
    }

    requestAnimationFrame(animate);
}

init();
animate();
</script>
