<script>
const canvas = document.getElementById("particleCanvas");
const ctx = canvas.getContext("2d");

let width, height, dpr;

function resizeCanvas() {

    dpr = window.devicePixelRatio || 1;

    width = window.innerWidth;
    height = window.innerHeight;

    canvas.width = width * dpr;
    canvas.height = height * dpr;

    canvas.style.width = width + "px";
    canvas.style.height = height + "px";

    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

resizeCanvas();

window.addEventListener("resize", () => {
    resizeCanvas();
    init();
});

const TEXT = "你咋不找我聊天";

const particles = [];
const burstParticles = [];

const mouse = {
    x: undefined,
    y: undefined,
    radius: 120,
    down: false
};

window.addEventListener("mousemove", e => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

window.addEventListener("mouseout", () => {
    mouse.x = undefined;
    mouse.y = undefined;
});

window.addEventListener("mousedown", e => {
    mouse.down = true;
    createBurst(e.clientX, e.clientY);
});

window.addEventListener("mouseup", () => {
    mouse.down = false;
});

window.addEventListener("touchstart", e => {

    const t = e.touches[0];

    mouse.x = t.clientX;
    mouse.y = t.clientY;
    mouse.down = true;

    createBurst(mouse.x, mouse.y);

}, { passive: true });

window.addEventListener("touchmove", e => {

    const t = e.touches[0];

    mouse.x = t.clientX;
    mouse.y = t.clientY;

}, { passive: true });

window.addEventListener("touchend", () => {

    mouse.down = false;

    mouse.x = undefined;
    mouse.y = undefined;

});

class Particle {

    constructor(x, y, color) {

        this.x = Math.random() * width;
        this.y = Math.random() * height;

        this.destX = x;
        this.destY = y;

        this.color = color;

        this.size = Math.random() * 1.8 + 1;
        this.baseSize = this.size;

        this.vx = (Math.random() - 0.5) * 10;
        this.vy = (Math.random() - 0.5) * 10;

        this.ease = 0.04;
        this.friction = 0.90;
    }

    update() {

        const dx = this.destX - this.x;
        const dy = this.destY - this.y;

        this.vx += dx * this.ease;
        this.vy += dy * this.ease;

        if (
            mouse.x !== undefined &&
            mouse.y !== undefined
        ) {

            const mx = mouse.x - this.x;
            const my = mouse.y - this.y;

            const dist = Math.sqrt(mx * mx + my * my);

            if (dist > 0 && dist < mouse.radius) {

                const force =
                    (mouse.radius - dist) /
                    mouse.radius;

                const angle =
                    Math.atan2(my, mx);

                const power =
                    mouse.down ? 8 : 3;

                this.vx -=
                    Math.cos(angle) *
                    force *
                    power;

                this.vy -=
                    Math.sin(angle) *
                    force *
                    power;

                this.size =
                    this.baseSize +
                    force * 2;

            } else {

                this.size +=
                    (this.baseSize - this.size)
                    * 0.08;
            }
        }

        this.vx *= this.friction;
        this.vy *= this.friction;

        this.x += this.vx;
        this.y += this.vy;
    }

    draw() {

        ctx.beginPath();

        ctx.fillStyle = this.color;

        ctx.arc(
            this.x,
            this.y,
            this.size,
            0,
            Math.PI * 2
        );

        ctx.fill();
    }
}

class BurstParticle {

    constructor(x, y) {

        this.x = x;
        this.y = y;

        this.vx =
            (Math.random() - 0.5) * 18;

        this.vy =
            (Math.random() - 0.5) * 18;

        this.life = 1;

        this.size =
            Math.random() * 3 + 1;

        const hue =
            280 + Math.random() * 80;

        this.color =
            `hsla(${hue},100%,70%,`;
    }

    update() {

        this.x += this.vx;
        this.y += this.vy;

        this.vx *= 0.96;
        this.vy *= 0.96;

        this.life -= 0.02;
    }

    draw() {

        ctx.beginPath();

        ctx.fillStyle =
            this.color + this.life + ")";

        ctx.arc(
            this.x,
            this.y,
            this.size,
            0,
            Math.PI * 2
        );

        ctx.fill();
    }
}

function createBurst(x, y) {

    for (let i = 0; i < 25; i++) {

        burstParticles.push(
            new BurstParticle(x, y)
        );
    }
}

function init() {

    particles.length = 0;

    const tempCanvas =
        document.createElement("canvas");

    const tempCtx =
        tempCanvas.getContext("2d");

    tempCanvas.width = width;
    tempCanvas.height = height;

    let fontSize;

    if (width < 600) {
        fontSize = 42;
    } else if (width < 1000) {
        fontSize = 90;
    } else {
        fontSize = 130;
    }

    tempCtx.fillStyle = "white";

    tempCtx.font =
        `900 ${fontSize}px sans-serif`;

    tempCtx.textAlign = "center";
    tempCtx.textBaseline = "middle";

    tempCtx.fillText(
        TEXT,
        width / 2,
        height / 2
    );

    const data =
        tempCtx.getImageData(
            0,
            0,
            width,
            height
        ).data;

    const gap =
        width < 600 ? 5 : 6;

    for (let y = 0; y < height; y += gap) {

        for (let x = 0; x < width; x += gap) {

            const index =
                (y * width + x) * 4;

            const alpha =
                data[index + 3];

            if (alpha > 128) {

                const hue =
                    280 + Math.random() * 80;

                const color =
                    `hsla(${hue},100%,70%,0.95)`;

                particles.push(
                    new Particle(
                        x,
                        y,
                        color
                    )
                );
            }
        }
    }
}

function connectParticles() {

    const maxDist = 28;

    for (let a = 0; a < particles.length; a++) {

        const p1 = particles[a];

        for (
            let b = a + 1;
            b < particles.length;
            b++
        ) {

            const p2 = particles[b];

            const dx = p1.x - p2.x;
            const dy = p1.y - p2.y;

            if (
                Math.abs(dx) > maxDist ||
                Math.abs(dy) > maxDist
            ) continue;

            const dist =
                Math.sqrt(dx * dx + dy * dy);

            if (dist < maxDist) {

                ctx.beginPath();

                ctx.strokeStyle =
                    `rgba(255,255,255,${
                        0.12 * (1 - dist / maxDist)
                    })`;

                ctx.lineWidth = 1;

                ctx.moveTo(p1.x, p1.y);

                ctx.lineTo(p2.x, p2.y);

                ctx.stroke();
            }
        }
    }
}

function animate() {

    ctx.fillStyle =
        "rgba(5,5,10,0.22)";

    ctx.fillRect(0, 0, width, height);

    connectParticles();

    for (const p of particles) {

        p.update();
        p.draw();
    }

    for (
        let i = burstParticles.length - 1;
        i >= 0;
        i--
    ) {

        const p = burstParticles[i];

        p.update();
        p.draw();

        if (p.life <= 0) {
            burstParticles.splice(i, 1);
        }
    }

    requestAnimationFrame(animate);
}

init();
animate();
</script>
